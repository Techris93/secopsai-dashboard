<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SecOpsAI Triage Dashboard</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #07111f;
      color: #dbeafe;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
  </style>
</head>
<body>
  <p>Loading SecOpsAI Triage Dashboard...</p>
  <script>
    fetch("/secopsai-dashboard/index.html", { cache: "no-store" })
      .then((response) => {
        if (!response.ok) throw new Error(`Dashboard shell HTTP ${response.status}`);
        return response.text();
      })
      .then((html) => {
        document.open();
        document.write(html);
        document.close();
      })
      .catch((error) => {
        document.body.innerHTML = `<main style="max-width: 640px; padding: 24px;">
          <h1>SecOpsAI dashboard failed to load</h1>
          <p>${error.message}</p>
          <p><a style="color:#67e8f9" href="/secopsai-dashboard/">Open the dashboard subfolder directly</a></p>
        </main>`;
      });
  </script>
  <noscript>
    <a style="color:#67e8f9" href="/secopsai-dashboard/">Open the SecOpsAI dashboard</a>
  </noscript>
</body>
</html>
