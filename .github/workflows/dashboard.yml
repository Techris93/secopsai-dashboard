name: Dashboard checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: secopsai-dashboard

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: secopsai-dashboard/package-lock.json

      - name: Install locked JavaScript dependencies
        run: npm ci --ignore-scripts

      - name: Check and test JavaScript
        run: |
          npm run check
          npm test
          npm audit --audit-level=moderate

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Test local helper contract
        run: |
          python -m pip install --disable-pip-version-check pytest
          python -m pytest -q
